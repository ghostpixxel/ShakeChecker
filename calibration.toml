# All CV calibration values live here (CLAUDE.md convention: every magic
# number names the fixture that justifies it). Loaded by battle_reader.py.

[hp_bar]
# Inner width of the enemy HP bar in px. The battle UI renders at a fixed
# pixel size regardless of window size/resolution: full_health_*.png and
# 1920x1080_resolution.png all measure exactly 218 px (scripts/measure_fill.py).
inner_width_px = 218
# Accept fill+empty totals within this tolerance of inner_width_px
# (anti-aliasing eats 1-2 px on each edge in two_third_green_health_cave.png).
width_tolerance_px = 8
# A fill run at least this wide counts as a (near-)full bar without needing
# the empty-part check (full_health_*.png: run == 218).
full_fill_min_px = 206

# Search region for enemy HP bars, relative to the captured frame. Spans the full
# top band: a single enemy sits top-left (y=200/1432=0.14, x=0.17) but HORDE bars
# run horizontally across the top (horde_triple_wild_encounter.png: three bars at
# y=199, x=0.32/0.45/0.58), so the last surviving horde mon can be anywhere. The
# player's own bar sits lower (y~0.45) and stays below search_bottom. NB the bar
# is at a FIXED pixel y (~200), so search_bottom must stay generous enough to
# include it on short windows (200/895=0.22 in batle_action_attack_chat_minimized_3).
search_top = 0.0
search_bottom = 0.30
search_left = 0.03
search_right = 0.97

# Fill blob geometry: bar fill is 3-6 px tall in all fixtures (10x6 px in
# red_health_no_status_cave.png); window-toolbar icons, status badges and
# stat-stage boxes are >= 10 px tall and get rejected by max height.
min_fill_height_px = 3
max_fill_height_px = 8
min_fill_width_px = 2

# Duplicate blobs of ONE bar resolve to the same fill run (same x) and y; merge
# only when BOTH are within these gaps. Two stacked enemy bars are 46 px apart in
# y (double_battle_no_status.png); horde bars are ~280 px apart in x — both stay
# unmerged so the bar count is right.
merge_y_px = 10
merge_x_px = 30

[hp_bar.hsv]
# OpenCV HSV (H 0-179). Saturation/value floors separate the bar fill from
# the white crosshatch and the dark frame in all *_health_* fixtures.
sat_min = 80
val_min = 80
green_h = [40, 75]
yellow_h = [20, 39]
red_h_low = [0, 10]
red_h_high = [170, 179]

[hp_bar.frame]
# The bar inner area is enclosed by a thin, perfectly uniform gray outline
# spanning the full 218 px directly above and below the fill
# (red_health_no_status_cave.png: V mean 108.8, V std 8.5, S 0 at y=197/204).
# The pokeball dex icon next to the name has no such line (V std 11-26,
# S mean ~50 in sandstorm haze) and is rejected by this check.
sat_mean_max = 25
val_std_max = 25
val_mean_min = 60
val_mean_max = 170
# how many rows above/below the fill blob to search for the outline row
search_px = 4

[hp_bar.empty]
# The empty bar part is a white diagonal crosshatch (red_health_no_status_cave.png),
# not dark: light pixels with low saturation.
val_min = 170
sat_max = 60
# Fraction of light pixels required between fill end and bar right edge.
# Crosshatch lattice lines dip below val_min, hence < 1.0
# (1_HP_red_health_no_status_cave.png has the longest empty stretch).
min_light_ratio = 0.70

[status]
# Status badge sits left of the enemy name, just above the bar's left edge.
# Box is relative to the bar fill-start x and bar mid-row y (UI is fixed-size,
# so the same offsets hold at every resolution). Verified against the SLP/PAR/
# PSN fixtures (e.g. full_health_sleeping/paralyzed, *_trainer_battle_poisoned).
dx0 = -24
dx1 = -3
dy0 = -28
dy1 = -7
# Every badge has a dark border + icon; the empty no-status slot is plain
# background (sky/cave) with no dark pixels. dark_frac is the presence signal:
# 0.00 for all no-status fixtures, >=0.13 for all badge fixtures.
dark_val_max = 90
present_dark_frac = 0.05
# Colored badge field: bright, saturated pixels of the badge fill colour.
fill_sat_min = 90
fill_val_min = 110
band_frac_min = 0.10
# SLP badge field is white/light grey (low saturation), not a hue.
white_sat_max = 70
white_val_min = 150
white_frac_min = 0.12

[status.hue]
# OpenCV H 0-179. PAR yellow and PSN magenta measured from fixtures; BRN red
# and FRZ cyan are extrapolated (no fixture) and covered by synthetic tests.
# The sky-blue background band (~100-116) is deliberately not a status colour.
yellow = [18, 38]
magenta = [140, 175]
red = [0, 12]
cyan = [85, 99]

[trainer]
# Trainer battles show a party indicator — six small icons (grey circles / Poke
# balls / Pokemon icons) — in a fixed strip just below the enemy HP bar, which
# wild battles lack. Detect it by edge density (Canny) in that strip, relative to
# the bar's (x, y). Measured: trainer fixtures (full_health_trainer_battle_*) ->
# edge_frac ~0.01-0.03; EVERY wild fixture -> exactly 0.000, so the threshold has
# a wide margin. width_px matches the bar inner width (218).
dy0 = 20
dy1 = 60
width_px = 218
edge_frac_min = 0.004

[battle_ui]
# Authoritative "in a battle" signal: the battle screen has a uniform dark
# command panel along the bottom of the viewport (action menu / move list /
# textbox) that is present throughout the battle including the intro banner and
# attack animations. The overworld bottom band is bright and textured.
# Measured (all fixtures): every battle scene -> dark_frac 1.00 (Vmean <= 40);
# every overworld -> 0.14-0.67 (Vmean 82-118). Battle membership uses THIS, not
# the enemy HP bar (which vanishes during animations), so "battle ended" fires
# only when the overlay actually disappears (faint / flee / back to overworld).
top = 0.78
bottom = 0.90
left = 0.15
right = 0.55
dark_val_max = 90
min_dark_frac = 0.90

[chat]
# Battle chat log, bottom-left of the WINDOW. Unlike the battle viewport (which
# is letterboxed and shifts with window size) the chat sits at a stable window
# position, so a fractional crop is reliable. It prints "Turn N started!", which
# the turn counter reads via OCR. Verified legible on full_health_no_status
# (shows "Turn 2 started!"). Requires the battle chat to be visible.
top = 0.90
bottom = 0.985
left = 0.0
right = 0.40
upscale = 2

[battle_text]
# The in-viewport text area at the bottom of the centered battle viewport. The
# SAME region shows, at different times: the command menu (FIGHT/BAG/POKEMON/RUN),
# the move submenu, and the narration box ("Gotcha! / X was caught!", "X used Y!",
# "X fainted!"). One OCR of this band drives BOTH the chat-independent turn counter
# (command-menu presence) and catch detection.
#
# Why here and not the chat log (bottom-left): this box belongs to the CURRENT
# frame, whereas the chat log lags ~1s -- at the moment a Pokemon is caught the
# chat still shows the PREVIOUS battle's catch line. This band also sits ABOVE the
# chat (y < 0.82 < chat's 0.90), so the chat's stale catch line cannot leak in.
#
# Band must cover the viewport bottom across window aspect ratios: the menu reads
# at y 0.65-0.75 in ~1.39 windows (full_health_no_status) but 0.52-0.61 in 16:9
# (1920x1080_resolution.png) because the viewport is letterboxed higher. Verified:
# all 4 menu keywords detected in both, the catch banner detected
# (batle_action_pokemon_catched_*), and NO false menu on the move submenu
# (two_third_green_health_cave), action textbox, catch, or overworld.
top = 0.48
bottom = 0.82
left = 0.04
right = 0.60
upscale = 2
# Command menu confirmed when at least this many of FIGHT/BAG/POKEMON/RUN are read
# (>=2 avoids a stray single-word false positive; the move list shows none).
menu_keywords_min = 2

[name]
# Enemy name region: right of the status badge, above the bar. Relative to the
# bar fill-start x and mid-row y (fixed-size UI). The crop spans name + "Lv. NN"
# + gender/caught icons; OCR text is cut at the level marker and fuzzy-matched
# against the species list. Verified against all named fixtures (Cascoon, Onix,
# Mantine, Ursaring, Pachirisu, Tentacool incl. 1920x1080).
dx0 = 2
dx1 = 230
dy0 = -34
dy1 = -6
upscale = 3
# rapidfuzz WRatio 0-100; below this the OCR result is treated as unrecognized.
min_match_score = 70.0
